<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Stethoscope Dashboard</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
        }
        .dashboard { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            max-width: 1000px; 
            margin: 0 auto; 
        }
        .card { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.5); 
        }
        h1 { color: #4caf50; border-bottom: 2px solid #333; padding-bottom: 10px; }
        h2 { margin-top: 0; color: #81c784; font-size: 1.2rem; }
        .chart-container {
            position: relative;
            height: 250px;
            width: 100%;
            overflow: hidden;
        }
        canvas { 
            width: 100% !important; 
            height: 100% !important; 
            background: #0a0a0a; 
            border-radius: 4px; 
            border: 1px solid #333;
        }
        .status { 
            font-size: 14px; 
            color: #aaa; 
            margin-top: 10px; 
            font-family: monospace;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="dashboard">
        <h1>Smart Stethoscope - Phase 1 MVP</h1>
        
        <div class="card">
            <h2>Live Oscilloscope (Downsampled Waveform)</h2>
            <div class="chart-container">
                <canvas id="waveformChart"></canvas>
            </div>
            <div class="status" id="mfccStatus">Initializing DSP pipeline...</div>
        </div>
    </div>
    
    <!-- Added cache-buster ?v=4 so your browser is forced to download the new fixed logic -->
    <script src="/static/app.js?v=4"></script>
</body>
</html>
